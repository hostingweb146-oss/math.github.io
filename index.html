<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Math Solver - ខ្មែរ</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Siemreap&display=swap" rel="stylesheet">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root {
            --primary: #2563eb;
            --bg: #f3f4f6;
            --text: #1f2937;
        }

        body {
            font-family: 'Siemreap', cursive, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .main-container {
            max-width: 800px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .header h1 { margin: 0; color: var(--primary); font-size: 2rem; }

        .upload-container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }

        #drop-zone {
            width: 100%;
            height: 200px;
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            cursor: pointer;
            margin-bottom: 20px;
            overflow: hidden;
        }

        #preview-img {
            max-width: 100%;
            max-height: 100%;
            display: none;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-family: 'Siemreap', sans-serif;
            transition: 0.2s;
        }

        .btn-camera { background: var(--primary); color: white; }
        .btn-solve { background: #10b981; color: white; grid-column: 1 / -1; font-weight: bold; }

        /* តំបន់បង្ហាញចម្លើយ (Gradient Design) */
        .result-box {
            display: none;
            background: linear-gradient(180deg, #6a82fb, #fc5c7d);
            color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            font-family: 'Siemreap', sans-serif;
            line-height: 1.8;
            margin-top: 20px;
        }

        .math-text {
            background: rgba(255, 255, 255, 0.15);
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 1.1rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center; align-items: center;
            z-index: 1000;
        }
        video { width: 100%; max-width: 400px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header">
        <h1>AI Math Solver</h1>
        <p>ភ្ជាប់រូបភាព ឬថតរូបលំហាត់ដើម្បីដោះស្រាយ</p>
    </div>

    <div class="upload-container">
        <div id="drop-zone" onclick="document.getElementById('file-input').click()">
            <div id="drop-text">🖼️ ចុចទីនេះ ឬ Paste រូបភាព (Ctrl+V)</div>
            <img id="preview-img" src="">
        </div>
        <input type="file" id="file-input" accept="image/*" hidden onchange="handleFile(this.files)">

        <div class="controls">
            <button onclick="document.getElementById('file-input').click()">📁 រើសរូបភាព</button>
            <button class="btn-camera" onclick="openCamera()">📷 ថតរូប</button>
            <button class="btn-solve" onclick="solve()">🧠 ដោះស្រាយជាមួយ AI</button>
        </div>
    </div>

    <div id="ai-status" style="text-align: center; margin-top: 10px; font-style: italic;"></div>
    
    <div id="result-area" class="result-box"></div>
</div>

<div id="camera-modal" class="modal">
    <div style="background: white; padding: 20px; border-radius: 15px; text-align: center;">
        <video id="video" autoplay playsinline></video><br><br>
        <button class="btn-camera" onclick="takePhoto()">📸 ថត</button>
        <button onclick="closeCamera()" style="background:#ef4444; color:white;">បិទ</button>
    </div>
</div>

<script>
    let imgData = null;

    // Paste Image
    document.addEventListener('paste', e => {
        const item = e.clipboardData.items[0];
        if (item.type.indexOf('image') !== -1) handleFile([item.getAsFile()]);
    });

    function handleFile(files) {
        const reader = new FileReader();
        reader.onload = e => {
            imgData = e.target.result;
            document.getElementById('preview-img').src = imgData;
            document.getElementById('preview-img').style.display = 'block';
            document.getElementById('drop-text').style.display = 'none';
        };
        reader.readAsDataURL(files[0]);
    }

    function openCamera() {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(s => {
                document.getElementById('video').srcObject = s;
                document.getElementById('camera-modal').style.display = 'flex';
            });
    }

    function closeCamera() {
        document.getElementById('video').srcObject.getTracks().forEach(t => t.stop());
        document.getElementById('camera-modal').style.display = 'none';
    }

    function takePhoto() {
        const canvas = document.createElement('canvas');
        const v = document.getElementById('video');
        canvas.width = v.videoWidth; canvas.height = v.videoHeight;
        canvas.getContext('2d').drawImage(v, 0, 0);
        imgData = canvas.toDataURL('image/png');
        document.getElementById('preview-img').src = imgData;
        document.getElementById('preview-img').style.display = 'block';
        document.getElementById('drop-text').style.display = 'none';
        closeCamera();
    }

    function solve() {
        if (!imgData) return alert("សូមបញ្ចូលរូបភាព!");
        
        const status = document.getElementById('ai-status');
        const res = document.getElementById('result-area');
        
        status.innerText = "កំពុងគណនា... ⏳";
        res.style.display = 'none';

        setTimeout(() => {
            status.innerText = "";
            res.style.display = 'block';
            res.innerHTML = `
                <p>ខាងក្រោមនេះជាដំណោះស្រាយ៖</p>
                <h3 style="border-bottom: 1px solid rgba(255,255,255,0.3); padding-bottom: 10px;">
                    **លីមីត៖** \\(\\lim_{x \\to 2} \\frac{x^3 - 8}{8(\\sqrt{x+2} - 2)}\\)
                </h3>
                
                <p><strong>១. ពិនិត្យរាងមិនកំណត់៖</strong><br>
                ជួស \\(x=2\\) នាំឱ្យភាគយក \\(2^3-8=0\\) និងភាគបែង \\(8(\\sqrt{4}-2)=0\\)។ លីមីតមានរាងមិនកំណត់ \\(\\frac{0}{0}\\)។</p>

                <p><strong>២. បំបែកភាគយកតាមរូបមន្ត \\(a^3-b^3\\)៖</strong><br>
                \\(x^3 - 2^3 = (x-2)(x^2+2x+4)\\)</p>

                <p><strong>៣. គុណកន្សោមឆ្លាស់នៅភាគបែង៖</strong></p>
                <div class="math-text">
                    \\(L = \\lim_{x \\to 2} \\frac{(x-2)(x^2+2x+4)(\\sqrt{x+2}+2)}{8(\\sqrt{x+2}-2)(\\sqrt{x+2}+2)}\\)<br><br>
                    \\(L = \\lim_{x \\to 2} \\frac{(x-2)(x^2+2x+4)(\\sqrt{x+2}+2)}{8(x+2-4)}\\)<br><br>
                    \\(L = \\lim_{x \\to 2} \\frac{(x-2)(x^2+2x+4)(\\sqrt{x+2}+2)}{8(x-2)}\\)
                </div>

                <p><strong>៤. សម្រួល និងគណនា៖</strong><br>
                សម្រួល \\(x-2\\) ចោល រួចជួស \\(x=2\\)៖<br>
                \\(L = \\frac{(2^2+2(2)+4)(\\sqrt{2+2}+2)}{8} = \\frac{12 \\times 4}{8} = 6\\)</p>

                <div style="font-size: 1.4rem; font-weight: bold; margin-top: 15px;">ដូចនេះ៖ \\(L = 6\\)</div>
            `;
            
            // ប្រាប់ MathJax ឱ្យ Render រូបមន្តដែលទើបនឹងបញ្ចូល
            MathJax.typeset();
        }, 1500);
    }
</script>

</body>
</html>
